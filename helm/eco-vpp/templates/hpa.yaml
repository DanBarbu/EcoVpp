apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "eco-vpp.fullname" . }}-webhook
  labels: {{- include "eco-vpp.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "eco-vpp.fullname" . }}-webhook
  minReplicas: {{ .Values.webhookReceiver.replicas }}
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
