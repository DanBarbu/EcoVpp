apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eco-vpp.fullname" . }}-settlement
  labels: {{- include "eco-vpp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.settlement.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "eco-vpp.name" . }}
      component: settlement
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "eco-vpp.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        component: settlement
    spec:
      containers:
        - name: settlement
          image: {{ include "eco-vpp.image" (dict "Values" .Values "component" "settlement") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8002
          env:
            - name: DATABASE_URL
              value: {{ include "eco-vpp.dbUrl" . | quote }}
            - name: SETTLEMENT_DRY_RUN
              value: {{ .Values.settlement.dryRun | quote }}
            - name: EW_RPC_URL
              value: {{ .Values.settlement.rpcUrl | quote }}
            - name: EW_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "eco-vpp.fullname" . }}-secrets
                  key: ewPrivateKey
            - name: EW_ORIGIN_CONTRACT
              value: {{ .Values.settlement.originContract | quote }}
            - name: BATCH_INTERVAL_S
              value: {{ .Values.settlement.batchIntervalSeconds | quote }}
          readinessProbe:
            httpGet: { path: /healthz, port: 8002 }
            initialDelaySeconds: 5
          resources: {{- toYaml .Values.settlement.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "eco-vpp.fullname" . }}-settlement
  labels: {{- include "eco-vpp.labels" . | nindent 4 }}
spec:
  type: {{ .Values.settlement.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "eco-vpp.name" . }}
    component: settlement
  ports:
    - port: {{ .Values.settlement.service.port }}
      targetPort: 8002
