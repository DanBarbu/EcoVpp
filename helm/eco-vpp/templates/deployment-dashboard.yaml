apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eco-vpp.fullname" . }}-dashboard
  labels: {{- include "eco-vpp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "eco-vpp.name" . }}
      component: dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "eco-vpp.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        component: dashboard
    spec:
      containers:
        - name: dashboard
          image: {{ include "eco-vpp.image" (dict "Values" .Values "component" "dashboard") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
          resources: {{- toYaml .Values.dashboard.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "eco-vpp.fullname" . }}-dashboard
  labels: {{- include "eco-vpp.labels" . | nindent 4 }}
spec:
  type: {{ .Values.dashboard.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "eco-vpp.name" . }}
    component: dashboard
  ports:
    - port: {{ .Values.dashboard.service.port }}
      targetPort: 80
