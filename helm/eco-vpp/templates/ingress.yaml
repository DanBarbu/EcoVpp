{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "eco-vpp.fullname" . }}
  labels: {{- include "eco-vpp.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: {{ include "eco-vpp.fullname" . }}-webhook
                port:
                  number: {{ .Values.webhookReceiver.service.port }}
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: {{ include "eco-vpp.fullname" . }}-webhook
                port:
                  number: {{ .Values.webhookReceiver.service.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "eco-vpp.fullname" . }}-dashboard
                port:
                  number: {{ .Values.dashboard.service.port }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
{{- end -}}
