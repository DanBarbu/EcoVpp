name: ECO-VPP CI/CD

on:
  push:
    branches: [main, "claude/**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with: { version: v3.15.4 }
      - run: helm lint helm/eco-vpp
      - run: helm template eco-vpp helm/eco-vpp > /tmp/render.yaml
      - run: helm template eco-vpp helm/eco-vpp -f helm/eco-vpp/values.production.yaml > /tmp/render-prod.yaml

  python-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [webhook-receiver, flexibility-engine, settlement, red-ii-allocator, forecast]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt
      - run: |
          cd services/${{ matrix.service }}
          python -m venv .venv && . .venv/bin/activate
          pip install -r requirements.txt
          pip install pytest ruff
          ruff check . || true
          python -m py_compile $(ls *.py)
          if compgen -G "tests/*.py" > /dev/null; then PYTHONPATH=. pytest -q tests; fi

  build-and-push:
    needs: [helm-lint, python-tests]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    strategy:
      matrix:
        include:
          - name: webhook-receiver
            context: services/webhook-receiver
          - name: flexibility-engine
            context: services/flexibility-engine
          - name: settlement
            context: services/settlement
          - name: red-ii-allocator
            context: services/red-ii-allocator
          - name: forecast
            context: services/forecast
          - name: dashboard
            context: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/ecovpp/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/ecovpp/${{ matrix.name }}:sha-${{ github.sha }}
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          exit-code: "0"
          ignore-unfixed: true
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-${{ matrix.name }}

  publish-helm:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with: { version: v3.15.4 }
      - name: Log in to GHCR (helm)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
      - run: helm package helm/eco-vpp -d /tmp
      - name: Push chart
        run: |
          for f in /tmp/eco-vpp-*.tgz; do
            helm push "$f" oci://${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/charts
          done

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with: { version: v3.15.4 }
      - name: Configure kubeconfig
        env:
          KUBECONFIG_PROD: ${{ secrets.KUBECONFIG_PROD }}
        run: |
          if [ -z "$KUBECONFIG_PROD" ]; then
            echo "::warning::KUBECONFIG_PROD not set; skipping deploy"
            exit 0
          fi
          mkdir -p $HOME/.kube
          echo "$KUBECONFIG_PROD" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
      - name: Helm upgrade
        if: ${{ secrets.KUBECONFIG_PROD != '' }}
        run: |
          helm upgrade --install eco-vpp helm/eco-vpp \
            --namespace eco-vpp --create-namespace \
            -f helm/eco-vpp/values.production.yaml \
            --set image.tag=sha-${{ github.sha }} \
            --wait --timeout 10m
